<div class="product-card">

  <a [href]="product().link" target="_blank"><h3>{{ product().name }}</h3><br>
  <img [src]="product().image" alt="{{ product().name }}"></a>
  <p>{{ product().description }}</p>
  <div class="central-div">
    <div class="price"><p><span class="gray">Price:</span> {{ product().price }} ₸</p></div>
    <div class="rating">
      <div class="stars-outer">
        <div class="stars-inner" [style.width.%]="(product().rating / 5) * 100"></div>
      </div>
      <span class="rating-value">{{ product().rating }}</span>
    </div>
  </div>

  <div class="button-div">
    <p><button (click)="toggleLike()" id="like-button" [class.liked]="product().liked">
    ❤</button> {{ product().likes }}</p>
    <button (click)="remove()" id="delete-button">Delete</button>
    <button (click)="share()" id="share-button">Share</button>
  </div>
</div>
